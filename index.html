<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Design Slide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --blue:        #312F96;
    --blue-dark:   #221F6E;
    --blue-light:  #5553C2;
    --blue-soft:   #EDEDFA;
    --orange:      #ED7335;
    --orange-soft: #FEF0E8;
    --orange-text: #C04A10;
    --green:       #1DB2B6;
    --green-dark:  #158A8D;
    --green-soft:  #E5F7F8;
    --bg:          #FFFFFF;
    --card:        #FFFFFF;
    --text:        #1A1940;
    --text-muted:  #8080B0;
    --border:      #E0E0F0;
    --row-hover:   #F5F5FD;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #C8C8E4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 20px;
  }

  /* TOOLBAR */
  .toolbar {
    background: var(--blue);
    border-radius: 14px;
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    width: 100%;
    max-width: 960px;
    flex-wrap: wrap;
  }
  .toolbar h2 {
    color: white;
    font-size: 16px;
    font-weight: 700;
    flex: 1;
    min-width: 100px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all .18s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }
  .btn-ghost { background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.2); }
  .btn-ghost:hover { background: rgba(255,255,255,0.2); }
  .resolution-select {
    background: rgba(255,255,255,0.12);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }
  .resolution-select option { background: var(--blue); color: white; }
  .week-input {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    width: 230px;
  }
  .week-input::placeholder { color: rgba(255,255,255,0.35); }

  /* SLIDE */
  #slide {
    background: #FFFFFF;
    width: 960px;
    border-radius: 0;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(49,47,150,0.12);
  }

  /* HEADER */
  .slide-header {
    background: var(--blue);
    padding: 10px 28px 9px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .slide-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--green) 0%, var(--blue-light) 50%, var(--orange) 100%);
  }
  .slide-header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(29,178,182,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .slide-title {
    font-size: 18px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.02em;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .week-badge {
    background: var(--green);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 3px 11px;
    border-radius: 20px;
  }
  .date-label {
    color: rgba(255,255,255,0.45);
    font-size: 11px;
  }

  /* BODY */
  .slide-body {
    padding: 18px 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* SECTION */
  .section { display: flex; flex-direction: column; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 7px;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 3px;
  }
  .section-bar {
    width: 3px; height: 16px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .bar-blue   { background: var(--blue); }
  .bar-green  { background: var(--green); }
  .bar-orange { background: var(--orange); }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text);
    border: none;
    outline: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    cursor: text;
    min-width: 50px;
    white-space: nowrap;
  }
  .section-title:focus { border-bottom: 1.5px solid var(--blue); }

  .section-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
  }
  .task-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .edit-hint {
    font-size: 10px;
    color: var(--blue);
    background: var(--blue-soft);
    border: 1px dashed rgba(49,47,150,0.25);
    border-radius: 4px;
    padding: 1px 6px;
    font-weight: 500;
  }

  /* TASK ROW */
  .task-row {
    display: flex;
    flex-direction: column;
    padding: 6px 8px;
    border-radius: 6px;
    transition: background .12s;
    border-bottom: 1px solid var(--border);
  }
  .task-row:last-of-type { border-bottom: none; }
  .task-row:hover { background: var(--row-hover); }

  .task-row-main {
    display: flex;
    align-items: center;
    gap: 0;
    width: 100%;
  }

  .task-index {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    width: 20px;
    flex-shrink: 0;
    user-select: none;
    align-self: flex-start;
    padding-top: 2px;
  }
  .task-text {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    cursor: text;
    padding: 0 10px 0 0;
    word-break: break-word;
    min-height: 20px;
  }
  .task-text:focus {
    background: rgba(49,47,150,0.04);
    border-radius: 4px;
    padding: 2px 10px 2px 4px;
  }
  .task-text:empty:before {
    content: attr(data-placeholder);
    color: var(--text-muted);
    pointer-events: none;
  }

  /* COMMENT */
  .task-comment-wrap {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-left: 20px;
    margin-top: 2px;
  }
  .comment-icon {
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0.5;
    flex-shrink: 0;
    margin-top: 1px;
    user-select: none;
  }
  .task-comment {
    flex: 1;
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.4;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    cursor: text;
    word-break: break-word;
    min-height: 16px;
    padding: 0;
  }
  .task-comment:empty:before {
    content: attr(data-placeholder);
    color: var(--border);
    pointer-events: none;
    font-style: italic;
  }
  .task-comment:focus { outline: none; }
  .task-comment:focus:empty:before { color: var(--text-muted); opacity: .5; }
  /* Hide comment line when empty and row not focused/hovered — show on hover */
  .task-comment-wrap { opacity: 0; max-height: 0; overflow: hidden; transition: opacity .15s, max-height .15s; }
  .task-row:hover .task-comment-wrap,
  .task-comment-wrap:focus-within,
  .task-comment-wrap.has-comment { opacity: 1; max-height: 60px; }

  /* STATUS */
  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .status-badge:hover { opacity: .8; transform: scale(.97); }
  .status-badge:active { transform: scale(.94); }
  .s-done     { background: var(--green-soft);  color: var(--green-dark); }
  .s-progress { background: var(--orange-soft); color: var(--orange-text); }
  .s-todo     { background: var(--blue-soft);   color: var(--blue); }

  .task-delete {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
    padding: 2px 4px;
    border-radius: 4px;
    margin-left: 6px;
    transition: all .12s;
    flex-shrink: 0;
  }
  .task-row:hover .task-delete { opacity: 1; }
  .task-delete:hover { color: #e04444; background: #fee; }

  /* ADD */
  .add-row-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    padding: 6px 8px;
    border-radius: 6px;
    transition: all .12s;
    width: 100%;
    margin-top: 2px;
  }
  .add-row-btn:hover { background: var(--row-hover); color: var(--blue); }

  .section-divider {
    height: 1px;
    background: var(--border);
  }

  /* FOOTER */
  .slide-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 28px;
    border-top: 1px solid var(--border);
    background: var(--card);
  }
  .footer-legend { display: flex; gap: 16px; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .leg-dot { width: 7px; height: 7px; border-radius: 50%; }
  .footer-hint { font-size: 11px; color: var(--text-muted); font-style: italic; }

  /* LOADING */
  #loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(49,47,150,0.72);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    backdrop-filter: blur(4px);
  }
  #loading-overlay.active { display: flex; }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #3FCFD3;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p { color: white; font-size: 15px; font-weight: 500; }

  .no-export {}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <h2>✦ Weekly Slide</h2>
  <input class="week-input" id="week-input" type="text" placeholder="Semaine —">
  <select class="resolution-select" id="resolution-select">
    <option value="1080">Export 1080p</option>
    <option value="2k" selected>Export 2K</option>
    <option value="4k">Export 4K</option>
  </select>
  <button class="btn btn-primary" onclick="exportPNG()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Exporter
  </button>
  <button class="btn btn-ghost" onclick="resetSlide()">↺ Reset</button>
</div>

<!-- SLIDE -->
<div id="slide">

  <div class="slide-header">
    <div class="slide-title">Weekly Design</div>
    <div class="header-right">
      <span class="week-badge" id="header-week">—</span>
      <span class="date-label" id="header-date"></span>
    </div>
  </div>

  <div class="slide-body">

    <!-- CONSULTING -->
    <div class="section" id="section-consulting">
      <div class="section-header">
        <div class="section-bar bar-blue"></div>
        <div class="section-title" contenteditable="true" oninput="saveState()">Consulting</div>
        <span class="edit-hint no-export">éditable</span>
        <span class="task-count" id="count-consulting"></span>
      </div>
      <div class="task-list" id="tasks-consulting"></div>
      <button class="add-row-btn no-export" onclick="addTask('consulting')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter une tâche
      </button>
    </div>

    <div class="section-divider"></div>

    <!-- DÉV -->
    <div class="section" id="section-dev">
      <div class="section-header">
        <div class="section-bar bar-green"></div>
        <div class="section-title" contenteditable="true" oninput="saveState()">DÉV</div>
        <span class="section-subtitle">&nbsp;Produit</span>
        <span class="edit-hint no-export">éditable</span>
        <span class="task-count" id="count-dev"></span>
      </div>
      <div class="task-list" id="tasks-dev"></div>
      <button class="add-row-btn no-export" onclick="addTask('dev')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter une tâche
      </button>
    </div>

    <div class="section-divider"></div>

    <!-- MARKETING -->
    <div class="section" id="section-marketing">
      <div class="section-header">
        <div class="section-bar bar-orange"></div>
        <div class="section-title" contenteditable="true" oninput="saveState()">Marketing</div>
        <span class="edit-hint no-export">éditable</span>
        <span class="task-count" id="count-marketing"></span>
      </div>
      <div class="task-list" id="tasks-marketing"></div>
      <button class="add-row-btn no-export" onclick="addTask('marketing')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter une tâche
      </button>
    </div>

  </div>

  <div class="slide-footer">
    <div class="footer-legend">
      <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div>Consulting</div>
      <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Dév Produit</div>
      <div class="leg"><div class="leg-dot" style="background:var(--orange)"></div>Marketing</div>
    </div>
    <div class="footer-hint no-export">Cliquez sur un statut pour le faire évoluer</div>
  </div>

</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Export en cours…</p>
</div>

<script>
const defaultData = {
  consulting: { tasks: [
    { text: "POC AKDITAL", status: "done", comment: "" },
    { text: "Plateforme partenaires (Louis)", status: "done", comment: "" },
    { text: "Refonte slides", status: "progress", comment: "" }
  ]},
  dev: { tasks: [
    { text: "", status: "todo", comment: "" }
  ]},
  marketing: { tasks: [
    { text: "Redesign / Mise à jour de la charte graphique Digdash", status: "progress", comment: "" },
    { text: "Nouvelle UI page d'accueil du site / page produit", status: "todo", comment: "" },
    { text: "Nouvelle UI page participation salon / page webinaire", status: "todo", comment: "" }
  ]}
};

const statusCycle  = ["todo", "progress", "done"];
const statusLabels = { done: "Terminé ✓", progress: "En cours", todo: "À venir" };
const statusClass  = { done: "s-done", progress: "s-progress", todo: "s-todo" };

function getWeekNumber(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const y = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - y) / 86400000) + 1) / 7);
}

function getWeekBounds(d) {
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d); mon.setDate(d.getDate() + diff);
  const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
  return { mon, fri };
}

function fmt(d, opts) { return d.toLocaleDateString('fr-FR', opts); }

async function initDates() {
  let now;
  try {
    const res = await fetch('https://worldtimeapi.org/api/timezone/Europe/Paris');
    if (!res.ok) throw new Error();
    const data = await res.json();
    now = new Date(data.datetime);
  } catch(e) {
    now = new Date();
  }
  const wn = getWeekNumber(now);
  const { mon, fri } = getWeekBounds(now);
  const label = `Semaine ${wn}  ·  ${fmt(mon,{ day:'numeric', month:'short' })} – ${fmt(fri,{ day:'numeric', month:'short', year:'numeric' })}`;
  document.getElementById('week-input').value = label;
  updateHeader(now);
}

function updateHeader(now) {
  const d = now || new Date();
  document.getElementById('header-week').textContent = document.getElementById('week-input').value || '—';
  document.getElementById('header-date').textContent = fmt(d, { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

document.getElementById('week-input').addEventListener('input', () => updateHeader());

function createRow(text, status, section, comment) {
  const row = document.createElement('div');
  row.className = 'task-row';
  const hasComment = comment && comment.trim().length > 0;
  row.innerHTML = `
    <div class="task-row-main">
      <span class="task-index">—</span>
      <div class="task-text" contenteditable="true" data-placeholder="Nouvelle tâche…" oninput="saveState()">${escHtml(text)}</div>
      <button class="status-badge ${statusClass[status]}" onclick="cycleStatus(this)">${statusLabels[status]}</button>
      <button class="task-delete no-export" onclick="removeRow(this,'${section}')">✕</button>
    </div>
    <div class="task-comment-wrap${hasComment ? ' has-comment' : ''}">
      <span class="comment-icon">↳</span>
      <div class="task-comment" contenteditable="true" data-placeholder="Ajouter un commentaire…" oninput="onCommentInput(this);saveState()">${escHtml(comment || '')}</div>
    </div>
  `;
  return row;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function onCommentInput(el) {
  const wrap = el.closest('.task-comment-wrap');
  if (el.textContent.trim().length > 0) wrap.classList.add('has-comment');
  else wrap.classList.remove('has-comment');
}

function cycleStatus(btn) {
  const cur = statusCycle.find(s => btn.classList.contains(statusClass[s])) || 'todo';
  const next = statusCycle[(statusCycle.indexOf(cur) + 1) % statusCycle.length];
  Object.values(statusClass).forEach(c => btn.classList.remove(c));
  btn.classList.add(statusClass[next]);
  btn.textContent = statusLabels[next];
  const section = btn.closest('.section').id.replace('section-', '');
  updateCount(section);
  saveState();
}

function removeRow(btn, section) {
  btn.closest('.task-row').remove();
  reindex(section);
  saveState();
}

function reindex(section) {
  document.getElementById(`tasks-${section}`)
    .querySelectorAll('.task-index')
    .forEach((el, i) => el.textContent = i + 1);
  updateCount(section);
}

function updateCount(section) {
  const rows = [...document.getElementById(`tasks-${section}`).querySelectorAll('.task-row')];
  const done = rows.filter(r => r.querySelector('.s-done')).length;
  const el = document.getElementById(`count-${section}`);
  el.textContent = rows.length > 0 ? `${done}/${rows.length} terminées` : '';
}

function addTask(section) {
  const list = document.getElementById(`tasks-${section}`);
  const row = createRow('', 'todo', section, '');
  list.appendChild(row);
  row.querySelector('.task-text').focus();
  reindex(section);
  saveState();
}

function renderSection(section, data) {
  const list = document.getElementById(`tasks-${section}`);
  list.innerHTML = '';
  data.tasks.forEach(t => list.appendChild(createRow(t.text, t.status, section, t.comment || '')));
  reindex(section);
}

function saveState() {
  const state = {};
  ['consulting','dev','marketing'].forEach(sec => {
    const titles = document.getElementById(`section-${sec}`).querySelectorAll('.section-title');
    state[sec] = {
      title: titles[0] ? titles[0].textContent.trim() : '',
      tasks: [...document.getElementById(`tasks-${sec}`).querySelectorAll('.task-row')].map(row => {
        const btn = row.querySelector('.status-badge');
        const status = statusCycle.find(s => btn.classList.contains(statusClass[s])) || 'todo';
        const commentEl = row.querySelector('.task-comment');
        return {
          text: row.querySelector('.task-text').textContent.trim(),
          status,
          comment: commentEl ? commentEl.textContent.trim() : ''
        };
      })
    };
  });
  try { localStorage.setItem('weekly-v2', JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  try { const r = localStorage.getItem('weekly-v2'); return r ? JSON.parse(r) : null; }
  catch(e) { return null; }
}

function resetSlide() {
  if (confirm('Réinitialiser toutes les tâches ?')) {
    try { localStorage.removeItem('weekly-v2'); } catch(e) {}
    init();
  }
}

async function exportPNG() {
  const overlay = document.getElementById('loading-overlay');
  overlay.classList.add('active');

  // Use visibility:hidden for inline elements (edit-hint) to preserve layout
  // Use display:none only for block-level add buttons and footer hint
  const inlineHide = document.querySelectorAll('.edit-hint');
  const blockHide  = document.querySelectorAll('.add-row-btn, .task-delete, .footer-hint');

  inlineHide.forEach(el => {
    el.dataset.origVis = el.style.visibility;
    el.style.visibility = 'hidden';
  });
  blockHide.forEach(el => {
    el.dataset.origDisplay = el.style.display;
    el.style.display = 'none';
  });

  const resMap = { '1080':[1920,1080], '2k':[2560,1440], '4k':[3840,2160] };
  const [targetW, targetH] = resMap[document.getElementById('resolution-select').value];
  const slide = document.getElementById('slide');
  const scale = targetW / slide.offsetWidth;

  try {
    const canvas = await html2canvas(slide, {
      scale, useCORS: true, allowTaint: true,
      backgroundColor: '#FFFFFF', logging: false,
      width: slide.offsetWidth, height: slide.scrollHeight
    });
    const final = document.createElement('canvas');
    final.width = targetW; final.height = targetH;
    const ctx = final.getContext('2d');
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, targetW, targetH);
    const yOff = Math.max(0, (targetH - canvas.height) / 2);
    ctx.drawImage(canvas, 0, 0, targetW, canvas.height, 0, yOff, targetW, Math.min(canvas.height, targetH));
    const link = document.createElement('a');
    link.download = `weekly-design-${new Date().toISOString().slice(0,10)}.png`;
    link.href = final.toDataURL('image/png', 1.0);
    link.click();
  } catch(err) {
    alert('Erreur : ' + err.message);
  } finally {
    inlineHide.forEach(el => el.style.visibility = el.dataset.origVis || '');
    blockHide.forEach(el => el.style.display = el.dataset.origDisplay || '');
    overlay.classList.remove('active');
  }
}

function init() {
  const saved = loadState() || defaultData;
  renderSection('consulting', saved.consulting);
  renderSection('dev',        saved.dev);
  renderSection('marketing',  saved.marketing);
  initDates();
}

init();
</script>
